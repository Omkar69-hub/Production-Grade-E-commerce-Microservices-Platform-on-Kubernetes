# 1. Default deny all incoming and outgoing traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: ecommerce
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# 2. Allow ingress controller to access frontend and gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress
  namespace: ecommerce
spec:
  podSelector:
    matchExpressions:
      - {key: app, operator: In, values: [api-gateway, frontend]}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector: {} # Allow from any namespace (wherever the ingress controller lives)
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 80
---
# 3. Allow API gateway to access backend services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-backend
  namespace: ecommerce
spec:
  podSelector:
    matchExpressions:
      - {key: app, operator: In, values: [auth-service, product-service, cart-service, order-service, payment-service, notification-service]}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: api-gateway
---
# 4. Allow all backend services to talk to infrastructure (Postgres, Redis, RabbitMQ)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-infra
  namespace: ecommerce
spec:
  podSelector:
    matchExpressions:
      - {key: app, operator: In, values: [postgres, redis, rabbitmq]}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchExpressions:
          - {key: app, operator: In, values: [auth-service, product-service, cart-service, order-service, payment-service, notification-service]}
---
# 5. Allow egress to CoreDNS and internal namespace communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-and-internal-egress
  namespace: ecommerce
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - to:
    - namespaceSelector:
        matchLabels:
          name: ecommerce
