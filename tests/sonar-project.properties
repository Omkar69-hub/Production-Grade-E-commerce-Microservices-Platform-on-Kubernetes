sonar.projectKey=ecommerce-platform
sonar.projectName=Production-Grade E-Commerce Platform
sonar.projectVersion=1.0.0

# Path to the source directories across microservices
sonar.sources=services/auth-service/src/main/java,services/product-service/src/main/java,services/order-service/src/main/java,services/payment-service/src/main/java,services/cart-service/src/main/java,services/notification-service/src/main/java,services/api-gateway/src/main/java

# Path to test directories
sonar.tests=services/auth-service/src/test/java,services/product-service/src/test/java,services/order-service/src/test/java,services/payment-service/src/test/java,services/cart-service/src/test/java,services/notification-service/src/test/java,services/api-gateway/src/test/java

# Language
sonar.language=java
sonar.java.binaries=**/target/classes

# Coverage reporting via JaCoCo
sonar.coverage.jacoco.xmlReportPaths=**/target/site/jacoco/jacoco.xml

# Quality Gate Metrics Thresholds (Configured in SonarQube Server typically, but reference here)
# sonar.qualitygate.wait=true
# sonar.coverage.exclusions=**/config/**,**/exception/**,**/dto/**,**/event/**

# File exclusions
sonar.exclusions=**/*.xml,**/*.json,**/node_modules/**,**/*.js,**/*.css
