# Rule IDs can be found here: https://www.zaproxy.org/docs/alerts/

# 10020: Anti-CSRF Tokens Check (Ignore for stateless API using JWT)
10020	IGNORE	(Anti-CSRF Tokens Check)

# 10021: X-Content-Type-Options Header Missing (Warn only, should be fixed in Gateway)
10021	WARN	(X-Content-Type-Options Header Missing)

# 10038: Content Security Policy (CSP) Header Not Set (Ignore for API endpoints)
10038	IGNORE	(Content Security Policy (CSP) Header Not Set)

# 10040: Secure Pages Include Mixed Content
10040	FAIL	(Secure Pages Include Mixed Content)

# Fail the build on any SQL Injection or XSS found
40018	FAIL	(SQL Injection)
40012	FAIL	(Cross Site Scripting (Reflected))
