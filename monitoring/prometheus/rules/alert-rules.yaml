apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ecommerce-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
  - name: application.rules
    rules:
    - alert: HighErrorRate
      expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (app, namespace) / sum(rate(http_server_requests_seconds_count[5m])) by (app, namespace) > 0.05
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "High 5xx error rate on {{ $labels.app }}"
        description: "{{ $labels.app }} in {{ $labels.namespace }} has > 5% 5xx errors for more than 2 minutes."

    - alert: HighResponseTime
      expr: histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le, app, namespace)) > 2
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High response time on {{ $labels.app }}"
        description: "The 95th percentile response time for {{ $labels.app }} in {{ $labels.namespace }} is greater than 2 seconds."
        
    - alert: PodCrashLooping
      expr: rate(kube_pod_container_status_restarts_total[5m]) * 60 * 5 > 2
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.pod }} is crash looping"
        description: "Pod {{ $labels.pod }} in {{ $labels.namespace }} has restarted more than 2 times in 5 minutes."

    - alert: HighMemoryUsage
      expr: container_memory_working_set_bytes{container!=""} / container_spec_memory_limit_bytes > 0.90
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High Memory Usage on {{ $labels.pod }}"
        description: "{{ $labels.pod }} is using over 90% of its memory limit."
