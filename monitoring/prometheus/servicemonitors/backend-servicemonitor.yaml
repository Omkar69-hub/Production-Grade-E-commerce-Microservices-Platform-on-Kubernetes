apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: spring-boot-backend-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchExpressions:
      - key: app
        operator: In
        values: 
          - api-gateway
          - auth-service
          - product-service
          - cart-service
          - order-service
          - payment-service
          - notification-service
  namespaceSelector:
    matchNames:
      - ecommerce-dev
      - ecommerce-staging
      - ecommerce-prod
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
