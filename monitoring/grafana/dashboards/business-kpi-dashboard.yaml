apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-business-kpi-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  business-kpi.json: |-
    {
      "title": "E-Commerce Business KPIs",
      "tags": ["ecommerce", "business"],
      "timezone": "browser",
      "schemaVersion": 16,
      "version": 0,
      "refresh": "10s",
      "panels": [
        {
          "title": "Orders Processed per Minute",
          "type": "stat",
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{app='order-service', uri=~'/api/orders.*', status='200'}[1m])) * 60",
              "legendFormat": "Orders/min"
            }
          ]
        },
        {
          "title": "Payment Success Rate (Last 5m)",
          "type": "gauge",
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{app='payment-service', status='200'}[5m])) / sum(rate(http_server_requests_seconds_count{app='payment-service'}[5m])) * 100",
              "legendFormat": "Success %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "orange", "value": 90 },
                  { "color": "green", "value": 98 }
                ]
              }
            }
          }
        },
        {
          "title": "Global Error Rate (5xx)",
          "type": "timeseries",
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{status=~'5..'}[1m])) by (app)",
              "legendFormat": "{{app}}"
            }
          ]
        }
      ]
    }
