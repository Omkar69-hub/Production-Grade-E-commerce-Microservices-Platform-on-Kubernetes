apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ecommerce.fullname" . }}-config
  labels:
    {{- include "ecommerce.labels" . | nindent 4 }}
data:
  DB_HOST: {{ .Values.config.DB_HOST | quote }}
  DB_PORT: {{ .Values.config.DB_PORT | quote }}
  REDIS_HOST: {{ .Values.config.REDIS_HOST | quote }}
  REDIS_PORT: {{ .Values.config.REDIS_PORT | quote }}
  RABBITMQ_HOST: {{ .Values.config.RABBITMQ_HOST | quote }}
  RABBITMQ_PORT: {{ .Values.config.RABBITMQ_PORT | quote }}
  SPRING_PROFILES_ACTIVE: {{ .Values.global.environment | quote }}
