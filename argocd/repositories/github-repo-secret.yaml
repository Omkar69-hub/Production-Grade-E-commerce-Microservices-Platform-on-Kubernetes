apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-repo-secret
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  # Replace with the actual URL of your repository
  url: https://github.com/your-org/production-grade-ecommerce-platform.git
  # Uncomment and replace if the repository is private
  # username: "<YOUR_GITHUB_USERNAME_HERE>"
  # password: "<YOUR_GITHUB_PAT_HERE>"
