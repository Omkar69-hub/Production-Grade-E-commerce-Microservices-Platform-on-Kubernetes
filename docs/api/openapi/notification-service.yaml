openapi: 3.1.0
info:
  title: Notification Service API
  version: 1.0.0
  description: Handles email and SMS notifications. This service is primarily event-driven (RabbitMQ consumers), but provides endpoints for querying notification history.
servers:
  - url: https://api.ecommerce.com/api/v1/notifications
tags:
  - name: Notifications
    description: Notification history
security:
  - bearerAuth: []
paths:
  /:
    get:
      tags:
        - Notifications
      summary: Get notifications for the current user
      responses:
        '200':
          description: List of notifications sent to the user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [EMAIL, SMS]
        subject:
          type: string
        sentAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [SENT, FAILED]
