spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/products/**
        - id: cart-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/cart/**
        - id: order-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/orders/**
        - id: payment-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/payments/**

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG
